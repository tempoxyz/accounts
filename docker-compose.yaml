name: accounts

services:
  install:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile"

  playground:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5173:5173'
    labels:
      dev.orbstack.domains: playground.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter playground dev -- --host"
    depends_on:
      install:
        condition: service_completed_successfully

  connect:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5176:5176'
    labels:
      dev.orbstack.domains: connect.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter connect dev -- --host"
    depends_on:
      install:
        condition: service_completed_successfully

  dialog-ref:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5174:5174'
    labels:
      dev.orbstack.domains: dialog-ref.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter dialog-ref dev -- --host"
    depends_on:
      install:
        condition: service_completed_successfully

  wagmi:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5175:5175'
    labels:
      dev.orbstack.domains: wagmi.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter wagmi dev -- --host --port 5175"
    depends_on:
      install:
        condition: service_completed_successfully

volumes:
  node_modules:
