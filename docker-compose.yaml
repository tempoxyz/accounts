name: accounts

services:
  install:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "apt-get update -qq && apt-get install -yqq git > /dev/null 2>&1; corepack enable && pnpm install --frozen-lockfile"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo
      POSTGRES_DB: tempo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: [CMD-SHELL, pg_isready -U tempo]
      interval: 2s
      timeout: 5s
      retries: 10

  playground:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5173:5173'
    labels:
      dev.orbstack.domains: playground.tempo.local
    command: >
      sh -c "apt-get update -qq && apt-get install -yqq git > /dev/null 2>&1; corepack enable && pnpm install --frozen-lockfile && pnpm --filter playground dev -- --host"
    healthcheck:
      test: [CMD, node, -e, "require('http').get('http://localhost:5173',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      start_period: 60s
      retries: 3
    depends_on:
      install:
        condition: service_completed_successfully

  connect:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5176:5176'
    environment:
      DATABASE_URL: postgres://tempo:tempo@host.docker.internal:5432/connect
      # workerd needs CA certs for outbound HTTPS fetch in local dev.
      # https://github.com/cloudflare/workers-sdk/issues/9356
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    labels:
      dev.orbstack.domains: connect.tempo.local
    command: >
      sh -c "apt-get update -qq && apt-get install -yqq ca-certificates git > /dev/null 2>&1; corepack enable && pnpm install --frozen-lockfile && pnpm --filter connect dev -- --host"
    healthcheck:
      test: [CMD, node, -e, "require('http').get('http://localhost:5176',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      start_period: 90s
      retries: 3
    depends_on:
      install:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  dialog-ref:
    profiles: [ref]
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5174:5174'
    labels:
      dev.orbstack.domains: dialog-ref.tempo.local
    command: >
      sh -c "apt-get update -qq && apt-get install -yqq git > /dev/null 2>&1; corepack enable && pnpm install --frozen-lockfile && pnpm --filter dialog-ref dev -- --host"
    depends_on:
      install:
        condition: service_completed_successfully

  manager:
    image: node:24-slim
    working_dir: /app/apps/manager
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5177:5177'
    environment:
      ALLOWED_HOSTS: manager.tempo.local
      DATABASE_URL: postgres://tempo:tempo@host.docker.internal:5432/tempo
      DEV_PORT: '5177'
      DEV_SUBDOMAIN: manager
      NO_SSL: '1'
    labels:
      dev.orbstack.domains: manager.tempo.local
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command: >
      sh -c "apt-get update -qq && apt-get install -y -qq socat ca-certificates >/dev/null 2>&1; socat TCP-LISTEN:5432,fork,reuseaddr TCP:postgres:5432 & corepack enable && pnpm drizzle-kit push --force && LOG_LEVEL=warn CLOUDFLARE=1 pnpm exec vite dev --port 5177 --host"
    healthcheck:
      test: [CMD, node, -e, "require('http').get('http://localhost:5177',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      start_period: 90s
      retries: 3
    depends_on:
      install:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  wagmi:
    profiles: [wagmi]
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5175:5175'
    labels:
      dev.orbstack.domains: wagmi.tempo.local
    command: >
      sh -c "apt-get update -qq && apt-get install -yqq git > /dev/null 2>&1; corepack enable && pnpm install --frozen-lockfile && pnpm --filter wagmi dev -- --host --port 5175"
    depends_on:
      install:
        condition: service_completed_successfully

volumes:
  node_modules:
  pgdata:
