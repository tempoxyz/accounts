name: accounts

services:
  install:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo
      POSTGRES_DB: tempo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  playground:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5173:5173'
    labels:
      dev.orbstack.domains: playground.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter playground dev -- --host"
    depends_on:
      install:
        condition: service_completed_successfully

  connect:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5176:5176'
    labels:
      dev.orbstack.domains: connect.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter connect dev -- --host"
    depends_on:
      install:
        condition: service_completed_successfully

  dialog-ref:
    profiles: [ref]
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5174:5174'
    labels:
      dev.orbstack.domains: dialog-ref.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter dialog-ref dev -- --host"
    depends_on:
      install:
        condition: service_completed_successfully

  manager:
    image: node:24-slim
    working_dir: /app/apps/manager
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5177:5177'
    environment:
      ALLOWED_HOSTS: manager.tempo.local
      DATABASE_URL: postgres://tempo:tempo@postgres:5432/tempo
      DEV_PORT: '5177'
      DEV_SUBDOMAIN: manager
      NO_SSL: '1'
    labels:
      dev.orbstack.domains: manager.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm drizzle-kit migrate && LOG_LEVEL=warn CLOUDFLARE=1 pnpm exec vite dev --port 5177 --host"
    depends_on:
      install:
        condition: service_completed_successfully
      postgres:
        condition: service_started

  wagmi:
    profiles: [wagmi]
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5175:5175'
    labels:
      dev.orbstack.domains: wagmi.tempo.local
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter wagmi dev -- --host --port 5175"
    depends_on:
      install:
        condition: service_completed_successfully

volumes:
  node_modules:
  pgdata:
