name: accounts-sdk

services:
  install:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      CI: 'true'
    command:
      - sh
      - -ec
      - |
          apt-get update -qq
          apt-get install -yqq git > /dev/null 2>&1
          corepack enable
          pnpm install --frozen-lockfile

  playground:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5173:5173'
    environment:
      ORIGIN: https://playground.accounts.local:5173
      RP_ID: playground.accounts.local
      MPP_SECRET_KEY: secret-key
      PRIVATE_KEY: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'
      VITE_ENV: testnet
      VITE_WALLET_HOST: ${VITE_WALLET_HOST:-https://wallet-next.tempo.xyz}
      VITE_REF_DIALOG_HOST: ${VITE_REF_DIALOG_HOST:-https://dialog-ref.accounts.local:5174}
    labels:
      dev.orbstack.domains: playground.accounts.local
    command: ['sh', '-c', 'corepack enable && pnpm --filter playground dev -- --host']
    healthcheck:
      test: [CMD, node, -e, "require('http').get('http://localhost:5173',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      start_period: 60s
      retries: 3
    depends_on:
      install:
        condition: service_completed_successfully

  wagmi:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5175:5175'
    labels:
      dev.orbstack.domains: wagmi.accounts.local
    command: ['sh', '-c', 'corepack enable && pnpm --filter wagmi dev -- --host --port 5175']
    healthcheck:
      test: [CMD, node, -e, "require('http').get('http://localhost:5175',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      start_period: 60s
      retries: 3
    depends_on:
      install:
        condition: service_completed_successfully

  dialog-ref:
    image: node:24-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5174:5174'
    labels:
      dev.orbstack.domains: dialog-ref.accounts.local
    command: ['sh', '-c', 'corepack enable && pnpm --filter dialog-ref dev -- --host']
    healthcheck:
      test: [CMD, node, -e, "require('http').get('http://localhost:5174',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      start_period: 60s
      retries: 3
    depends_on:
      install:
        condition: service_completed_successfully

volumes:
  node_modules:
