packages:
  - .
  - examples/*
  - playgrounds/*
  - ref-impls/*

blockExoticSubdeps: true

catalog:
  '@cloudflare/vite-plugin': ^1.31.2
  '@cloudflare/workers-types': ^4.20260317.1
  '@tanstack/react-query': ^5.97.0
  '@tanstack/react-router': ^1.168.19
  '@tanstack/react-start': ^1.166.7
  '@total-typescript/ts-reset': ^0.6.1
  '@types/node': ^25.6.0
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  '@vitejs/devtools': ^0.1.15
  '@vitejs/plugin-react': ^5.2.0
  '@wagmi/core': ^3.4.5
  hono: ^4.12.14
  ox: ~0.14.18
  prool: ~0.2.4
  react: ^19.2.5
  react-dom: ^19.2.5
  tsx: ^4.21.0
  typed-query-selector: ^2.12.1
  typescript: ^5.9.3
  viem: ^2.48.4
  vite: ^8.0.5
  vite-plus: ~0.1.18
  vp: npm:vite-plus@~0.1.18
  wagmi: ^3.6.4
  wrangler: ^4.85.0
  zod: ^4.3.6
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - incur
  - mppx
  - ox
  - secretlint
  - viem
  - vite-plus
  - '@voidzero-dev/*'
nodeOptions: '--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning'

onlyBuiltDependencies:
  - bufferutil
  - cloudflared
  - cpu-features
  - esbuild
  - protobufjs
  - sharp
  - simple-git-hooks
  - ssh2
  - utf-8-validate
  - workerd

shellEmulator: true

strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
