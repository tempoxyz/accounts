packages:
  - .
  - apps/*
  - dialog
  - examples/*
  - playgrounds/*
  - ref-impls/*

blockExoticSubdeps: true

catalog:
  '@cloudflare/vite-plugin': ^1.31.2
  '@cloudflare/workers-types': ^4.20260317.1
  '@tanstack/react-query': ^5.97.0
  '@tanstack/react-router': ^1.168.19
  '@tanstack/react-start': ^1.166.7
  '@tanstack/router-plugin': ^1.167.12
  '@tailwindcss/vite': ^4.2.1
  '@total-typescript/ts-reset': ^0.6.1
  '@types/node': ^25.5.0
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  '@vitejs/devtools': ^0.1.3
  '@vitejs/plugin-react': ^5.2.0
  '@wagmi/core': ^3.4.2
  hono: ^4.12.12
  ox: ~0.14.18
  prool: ~0.2.4
  react: ^19.2.5
  react-dom: ^19.2.5
  tsx: ^4.21.0
  tailwindcss: ^4.2.1
  typed-query-selector: ^2.12.1
  typescript: ^5.9.3
  viem: ^2.48.1
  vite: ^8.0.5
  vite-plus: ~0.1.18
  vp: npm:vite-plus@~0.1.18
  wagmi: ^3.6.1
  wrangler: ^4.83.0
  zod: ^4.3.6
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@base-ui/react'
  - '@base-ui/utils'
  - '@j178/prek'
  - '@secretlint/*'
  - '@tanstack/*'
  - incur
  - mppx
  - ox
  - secretlint
  - viem
  - vite-plus
  - '@voidzero-dev/*'

onlyBuiltDependencies:
  - '@j178/prek'
  - bufferutil
  - cloudflared
  - core-js
  - cpu-features
  - esbuild
  - protobufjs
  - secp256k1
  - sharp
  - simple-git-hooks
  - ssh2
  - utf-8-validate
  - workerd

strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - reselect@5.1.1
  - semver@6.3.1
