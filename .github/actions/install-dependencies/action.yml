name: 'Install dependencies'
description: 'Prepare repository and all dependencies'

inputs:
  playwright:
    description: 'Install Playwright browsers'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Get Playwright version
      if: inputs.playwright == 'true'
      id: playwright-version
      shell: bash
      run: echo "version=$(node -e "const lf = require('fs').readFileSync('pnpm-lock.yaml','utf8'); const m = lf.match(/playwright@(\d+\.\d+\.\d+)/); process.stdout.write(m?.[1] ?? 'unknown')")" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      if: inputs.playwright == 'true'
      id: playwright-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright browsers
      if: inputs.playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: pnpx playwright install chromium --with-deps

    - name: Install Playwright system deps
      if: inputs.playwright == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: pnpx playwright install-deps chromium
