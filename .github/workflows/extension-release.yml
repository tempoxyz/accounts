name: Extension Release
on:
  release:
    types: [published]

jobs:
  upload:
    name: Upload Extension (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - browser: chrome
            build-cmd: pnpm --filter extension zip
            zip-glob: ref-impls/extension/.output/*-chrome.zip
            asset-name: tempo-wallet-chrome.zip
          - browser: firefox
            build-cmd: pnpm --filter extension zip:firefox
            zip-glob: ref-impls/extension/.output/*-firefox.zip
            asset-name: tempo-wallet-firefox.zip

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build extension zip
        run: ${{ matrix.build-cmd }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          zip_file=$(ls ${{ matrix.zip-glob }})
          gh release upload "${{ github.event.release.tag_name }}" \
            "${zip_file}#${{ matrix.asset-name }}" \
            --clobber

  amend-notes:
    name: Amend Release Notes
    needs: upload
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Append extension install instructions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          existing=$(gh release view "$tag" --repo "${{ github.repository }}" --json body -q .body)

          cat <<'EOF' >> /tmp/extension-notes.md

          ---

          ### 🧩 Browser Extension

          | Browser | Download |
          |---------|----------|
          | Chrome | [tempo-wallet-chrome.zip](https://github.com/${{ github.repository }}/releases/download/${TAG}/tempo-wallet-chrome.zip) |
          | Firefox | [tempo-wallet-firefox.zip](https://github.com/${{ github.repository }}/releases/download/${TAG}/tempo-wallet-firefox.zip) |

          <details>
          <summary>Install instructions</summary>

          **Chrome:**
          1. Download and unzip `tempo-wallet-chrome.zip`
          2. Go to `chrome://extensions`
          3. Enable "Developer mode"
          4. Click "Load unpacked" and select the unzipped folder

          **Firefox:**
          1. Download and unzip `tempo-wallet-firefox.zip`
          2. Go to `about:debugging#/runtime/this-firefox`
          3. Click "Load Temporary Add-on"
          4. Select any file in the unzipped folder
          </details>
          EOF

          sed -i "s|\${TAG}|${tag}|g" /tmp/extension-notes.md

          printf '%s\n%s' "$existing" "$(cat /tmp/extension-notes.md)" > /tmp/full-notes.md

          gh release edit "$tag" \
            --repo "${{ github.repository }}" \
            --notes-file /tmp/full-notes.md
