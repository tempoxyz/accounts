name: Deploy Workers
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-workers-${{ github.event.pull_request.number || 'production' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ matrix.worker.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    strategy:
      matrix:
        worker:
          - name: Connect
            directory: apps/connect
          - name: Playground
            directory: playgrounds/web
          - name: Wagmi
            directory: playgrounds/wagmi

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build accounts
        run: pnpm build

      - name: Compute Connect host
        id: connect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA=$(echo "${{ github.sha }}" | head -c 7)
            echo "host=https://${SHA}-tempo-connect.porto.workers.dev" >> "$GITHUB_OUTPUT"
          else
            echo "host=https://connect.tempo.xyz" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        working-directory: ${{ matrix.worker.directory }}
        run: pnpm build
        env:
          VITE_CONNECT_HOST: ${{ steps.connect.outputs.host }}
          VITE_ENV: testnet

      - name: Deploy
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.worker.directory }}

      - name: Preview
        id: preview
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.worker.directory }}
          command: versions upload

      - name: Preview URL
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3.0.3
        with:
          header: deploy-${{ matrix.worker.name }}
          message: |
            | Worker | Preview |
            |--------|---------|
            | ${{ matrix.worker.name }} | ${{ steps.preview.outputs.deployment-url }} |
